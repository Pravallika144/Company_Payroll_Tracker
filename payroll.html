<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Makes the webpage responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser Title -->
    <title>Company Payroll Tracker</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===============================
            MAIN CONTAINER
    ================================ -->

    <div class="container">

        <!-- Project Heading -->
        <h1>Company Payroll Tracker</h1>

        <!-- Short Description -->
        <p class="subtitle">
            Manage employee salary records easily.
        </p>


        <!-- ===============================
                EMPLOYEE FORM
        ================================ -->

        <div class="form-box">

            <!-- Employee ID -->
            <div class="form-group">

                <label for="empId">
                    Employee ID
                </label>

                <input
                    type="text"
                    id="empId"
                    placeholder="Enter Employee ID">

            </div>


            <!-- Employee Name -->
            <div class="form-group">

                <label for="empName">
                    Employee Name
                </label>

                <input
                    type="text"
                    id="empName"
                    placeholder="Enter Employee Name">

            </div>


            <!-- Department -->
            <div class="form-group">

                <label for="department">
                    Department
                </label>

                <select id="department">

                    <option value="">
                        Select Department
                    </option>

                    <option>HR</option>

                    <option>Finance</option>

                    <option>Sales</option>

                    <option>Marketing</option>

                    <option>Development</option>

                    <option>Testing</option>

                </select>

            </div>


            <!-- Basic Salary -->
            <div class="form-group">

                <label for="salary">
                    Basic Salary
                </label>

                <input
                    type="number"
                    id="salary"
                    placeholder="Enter Salary">

            </div>


            <!-- Add Employee Button -->
            <button
                class="btn"
                onclick="addEmployee()">

                Add Employee

            </button>

        </div>



        <!-- ===============================
                SEARCH BOX
        ================================ -->

        <div class="search-box">

            <input

                type="text"

                id="search"

                placeholder="Search Employee by ID"

                onkeyup="searchEmployee()">

        </div>



        <!-- ===============================
                EMPLOYEE TABLE
        ================================ -->

        <table>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Department</th>

                    <th>Basic</th>

                    <th>HRA</th>

                    <th>DA</th>

                    <th>Tax</th>

                    <th>Net Salary</th>

                    <th>Action</th>

                </tr>

            </thead>

            <!-- Employee records will appear here -->

            <tbody id="employeeTable">

            </tbody>

        </table>



        <!-- ===============================
                SUMMARY SECTION
        ================================ -->

        <div class="summary">

            <div class="card">

                <h3>Total Employees</h3>

                <p id="totalEmployees">
                    0
                </p>

            </div>

            <div class="card">

                <h3>Total Payroll</h3>

                <p>

                    ₹<span id="totalPayroll">

                        0

                    </span>

                </p>

            </div>

            <div class="card">

                <h3>Average Salary</h3>

                <p>

                    ₹<span id="averageSalary">

                        0

                    </span>

                </p>

            </div>

        <div class="card">

    <h3>Highest Salary</h3>

    <p>

        ₹<span id="highestSalary">0</span>

    </p>

</div>

<div class="card">

    <h3>Lowest Salary</h3>

    <p>

        ₹<span id="lowestSalary">0</span>

    </p>

</div>
</div>

        <!-- Buttons -->

        <div class="button-group">

            <button
                class="btn"
                onclick="downloadCSV()">

                Download Report

            </button>

            <button
                class="btn"
                onclick="window.print()">

                Print Report

            </button>
            <button class="btn" onclick="clearAllEmployees()">

             Clear All Records

             </button>

        </div>

    </div>


    <!-- External JavaScript -->

    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">

</body>

</html>
